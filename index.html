<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiRezXBug</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  background: linear-gradient(-45deg, #000000, #1a0000, #000000, #220000);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color:white;
  font-family:'Share Tech Mono',monospace;
  min-height: 100vh;
  margin: 0;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* TITLE */
.title{
  text-align:center;
  font-family:'Creepster';
  font-size:45px;
  color:#ff1a1a;
  position: relative;
  text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
               -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
               0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
  animation: glitch 500ms infinite;
}

@keyframes glitch {
  0% {
    text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                 -0.05em -0.025em 0 rgba(0, 255, 0, 0.75),
                 -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
  }
  14% {
    text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                 -0.05em -0.025em 0 rgba(0, 255, 0, 0.75),
                 -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
  }
  15% {
    text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75),
                 0.025em 0.025em 0 rgba(0, 255, 0, 0.75),
                 -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
  }
  49% {
    text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75),
                 0.025em 0.025em 0 rgba(0, 255, 0, 0.75),
                 -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
  }
  50% {
    text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75),
                 0.05em 0 0 rgba(0, 255, 0, 0.75),
                 0 -0.05em 0 rgba(0, 0, 255, 0.75);
  }
  99% {
    text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75),
                 0.05em 0 0 rgba(0, 255, 0, 0.75),
                 0 -0.05em 0 rgba(0, 0, 255, 0.75);
  }
  100% {
    text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75),
                 -0.025em -0.025em 0 rgba(0, 255, 0, 0.75),
                 -0.025em -0.05em 0 rgba(0, 0, 255, 0.75);
  }
}

/* NINJA */
.ninja{
  width:200px;
  margin:30px auto;
  transition:0.5s;
  animation: bobbing 3s ease-in-out infinite;
}

@keyframes bobbing {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.ninja.idle{
  transform:scale(1.2);
  animation: bobbing-idle 1s ease-in-out infinite;
}

@keyframes bobbing-idle {
  0%, 100% { transform: scale(1.2) translateY(0); }
  50% { transform: scale(1.2) translateY(-10px); }
}

/* HEAD */
.head{
  width:200px;
  height:120px;
  background:#111;
  border-radius:100px 100px 60px 60px;
  position:relative;
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
  transition: 0.5s;
}

.ninja.idle .head {
  box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
}

/* MASK */
.mask{
  position:absolute;
  top:35px;
  left:20px;
  width:160px;
  height:45px;
  background:black;
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* EYE */
.eye{
  width:60px;
  height:30px;
  background:#222;
  border-radius:30px/15px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}

.eye.sharp{
  height:8px;
}

/* IRIS */
.iris{
  width:25px;
  height:25px;
  background:red;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:15px;
}

.pupil{
  width:10px;
  height:10px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:7px;
  left:7px;
}

/* TEXT IDLE */
.idleText{
  text-align:center;
  font-family:'Creepster';
  font-size:30px;
  color:red;
  margin-top:10px;
  opacity:0;
  transition:0.3s;
}

.idleText.show{
  opacity:1;
}

/* CARD */
.card{
  max-width:700px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(20,0,0,0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 0, 0, 0.5);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
  animation: border-pulsate 2s infinite;
}

@keyframes border-pulsate {
  0%, 100% { border-color: rgba(255, 0, 0, 0.5); box-shadow: 0 0 5px rgba(255, 0, 0, 0.2); }
  50% { border-color: rgba(255, 0, 0, 1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(255, 0, 0, 0.5);
  background:rgba(0,0,0,0.5);
  color:white;
  transition: 0.3s;
  outline: none;
}

input:focus, select:focus {
  border-color: #ff1a1a;
  box-shadow: 0 0 10px rgba(255, 26, 26, 0.5);
  background: rgba(0,0,0,0.8);
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  background: linear-gradient(45deg, #ff0000, #990000);
  color:white;
  cursor:pointer;
  border-radius: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
  background: linear-gradient(45deg, #ff1a1a, #b30000);
}

button:active {
  transform: translateY(-1px);
}

.result{
  margin-top:15px;
  background:black;
  padding:12px;
  color:#00ffcc;
}

.wa-btn{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#25D366;
  text-align:center;
  border-radius:10px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="title">DiRezXBug</div>

<div class="ninja" id="ninja">
  <div class="head">
    <div class="mask">
      <div class="eye"><div class="iris"><div class="pupil"></div></div></div>
      <div class="eye"><div class="iris"><div class="pupil"></div></div></div>
    </div>
  </div>
</div>

<div class="idleText" id="idleText">WOY MAU BUG GAK LU?</div>

<div class="card">

<input type="text" id="target" placeholder="62xxxxxxxxxx">

<select id="bug">
<option value="delay">Delay</option>
<option value="force">Force Close</option>
<option value="crash">Crash</option>
</select>

<input type="number" id="spam" placeholder="Jumlah Spam">

<button onclick="kirim()">Execute</button>

<div class="result" id="result">System Ready...</div>

<a id="waLink" class="wa-btn" target="_blank">Cek Target</a>

</div>

<script>
// FUNCTION TETAP
const TOKEN="ISI_TOKEN_KAMU";
const CHAT_ID="-1001234567890";

function kirim(){
  const target=document.getElementById("target").value;
  const bug=document.getElementById("bug").value;
  const spam=document.getElementById("spam").value;

  let resultText="";
  if(bug==="delay") resultText=`/xbugs ${target}`;
  if(bug==="force") resultText=`/forceclose ${target}`;
  if(bug==="crash") resultText=`/crash ${target}`;

  document.getElementById("result").innerText=resultText;

  for(let i=0;i<(spam||1);i++){
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id:CHAT_ID,
        text:"Result Bug DiRez:\n"+resultText
      })
    });
  }

  let wa=document.getElementById("waLink");
  wa.style.display="block";
  wa.href="https://wa.me/"+target;
}

// FOLLOW
let mouseX=0, mouseY=0;
let lastMove=Date.now();

document.addEventListener("mousemove",(e)=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
  lastMove=Date.now();
});

function animateEyes(){
  document.querySelectorAll(".iris").forEach(iris=>{
    const rect=iris.parentElement.getBoundingClientRect();
    const x=rect.left+rect.width/2;
    const y=rect.top+rect.height/2;

    const dx=(mouseX-x)/20;
    const dy=(mouseY-y)/20;

    iris.style.transform=`translate(${dx}px,${dy}px)`;
  });

  requestAnimationFrame(animateEyes);
}
animateEyes();

// IDLE DETECT
setInterval(()=>{
  if(Date.now()-lastMove > 2000){
    document.getElementById("ninja").classList.add("idle");
    document.getElementById("idleText").classList.add("show");

    document.querySelectorAll(".eye").forEach(e=>e.classList.add("sharp"));
  }else{
    document.getElementById("ninja").classList.remove("idle");
    document.getElementById("idleText").classList.remove("show");

    document.querySelectorAll(".eye").forEach(e=>e.classList.remove("sharp"));
  }
},500);
</script>

</body>
</html>
