<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiRezXBug | Cyber Dashboard</title>
    <!-- Fonts: Orbitron for titles, Poppins for content, Amiri for Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Layers -->
    <div class="lightning-overlay"></div>
    <div class="clouds"></div>
    <canvas id="fire-canvas"></canvas>

    <div class="container">
        <header>
            <div class="logo">DIREZXBUG</div>
            <p class="tagline">Advanced Cyber Gaming Spammer</p>
        </header>

        <main class="panel">
            <div class="input-group">
                <label for="target">Target Number</label>
                <input type="text" id="target" placeholder="62xxxxxxxxxx">
            </div>

            <div class="input-group">
                <label class="slider-label">Pilih Type Bug</label>
                <div class="bug-slider-container">
                    <div class="bug-slider" id="bugSlider">
                        <div class="bug-card active" data-value="delay">
                            <span>Bug Delay</span>
                        </div>
                        <div class="bug-card" data-value="delayhard">
                            <span>Bug Delay Hard</span>
                        </div>
                        <div class="bug-card" data-value="force">
                            <span>Bug Forclose UI</span>
                        </div>
                        <div class="bug-card" data-value="crash">
                            <span>Bug CrashXBlank</span>
                        </div>
                        <div class="bug-card" data-value="spamdelay">
                            <span>Bug Spam Delay Click (The Hard Bug)</span>
                        </div>
                    </div>
                </div>
                <!-- Optional Indicator -->
                <div class="slider-dots" id="sliderDots"></div>
            </div>


            <button class="execute-btn" onclick="kirim()">EXECUTE</button>

            <div class="result-container">
                <div class="terminal-header">
                    <span>SYSTEM TERMINAL</span>
                    <div class="dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="result" id="result">System Ready...</div>
            </div>

            <a id="waLink" class="wa-btn" target="_blank">Cek Target</a>
        </main>

        <div id="hadith-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
